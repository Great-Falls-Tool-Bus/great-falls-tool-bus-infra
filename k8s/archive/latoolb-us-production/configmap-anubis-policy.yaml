# TIN-2528 — Anubis bot policy for the PUBLIC discuss@ archive route.
#
# This is the upstream v1.13.0 default policy with the forms-specific
# `/api/contact` ALLOW REMOVED (there is no API on this route), ONE rule
# PREPENDED (an anti-bulk-export CHALLENGE on HyperKitty's mbox export path),
# and — as of the read-path exemption below — three ALLOW rules for the
# discuss@ list-overview page, its thread permalinks, and static assets.
#
# HOW THIS DIFFERS FROM THE FORMS POLICY (k8s/form/.../configmap-anubis-policy):
#   - The forms route needed an ALLOW carve-out because a cross-origin JSON
#     fetch() cannot solve a browser PoW challenge. The archive is a pure
#     BROWSING surface, so that carve-out does not apply here; the read-path
#     ALLOWs below exist for a different reason (see next section).
#   - Search-engine crawlers (Googlebot/Bingbot/Qwant) stay ALLOWed. The
#     discuss@ archive is intentionally public, so indexing it is desirable;
#     an operator who wants the archive UN-indexed flips those three to DENY
#     (and see robots.txt note in the packet). Crawlers can never reach the
#     PRIVATE keyholders@ archive regardless — HyperKitty returns 403/404 for
#     a private list to any anonymous client, allowlisted crawler or not.
#
# READ-PATH EXEMPTION (deep-link de-interstitial, post-TIN-2559): the on-site
# `/discuss` reader (greatfallstoolbus.org/discuss, TIN-2559) now serves the
# SAME discuss@ thread content ungated, straight from the in-cluster HyperKitty
# REST API. That means PoW on HyperKitty's own READ paths for this list no
# longer buys any confidentiality — the content is already public and already
# reachable without solving a challenge — so gating them only cost a deep-link
# interstitial for anyone who lands on a lists.latoolb.us permalink (shared
# link, search result, RSS reader, etc.). The three ALLOWs below remove that
# interstitial for exactly the discuss@ read surfaces and nothing else:
#   - the discuss@ list-overview page (`hyperkitty-discuss-list-overview`)
#   - discuss@ thread permalinks (`hyperkitty-discuss-thread-permalinks`),
#     i.e. the deep-link targets that get shared/indexed
#   - `/static/*` (`hyperkitty-static-assets`) — required alongside the above:
#     without it, a challenge-cookie-less request for the page's CSS/JS still
#     gets CHALLENGEd and the "ungated" page renders unstyled/broken.
# The gate's REMAINING purpose — bulk-abuse / load protection — is preserved:
# the mbox-export CHALLENGE below is untouched, and every other path (list
# search, feeds, admin, pagination edges, the keyholders@ list, etc.) still
# falls through to the generic browser CHALLENGE. keyholders@ paths are NOT
# matched by these ALLOWs (the regexes are scoped to the literal
# `discuss@latoolb.us` path segment) and remain challenged as before; HyperKitty
# also 403s anonymous reads of that private list regardless, so it is
# defense-in-depth, not the only control.
#
# PATH PREFIX — LIVE-VERIFIED 2026-07-06: this deployment mounts HyperKitty's
# public browsing surface at `/hyperkitty/list/<list>@<domain>/...`, NOT at
# `/archives/list/...`:
#   - https://lists.latoolb.us/hyperkitty/list/discuss@latoolb.us/  -> 200
#   - https://lists.latoolb.us/archives/list/discuss@latoolb.us/    -> 404
#   - the archive page's own export links point at
#     /hyperkitty/list/discuss@latoolb.us/export/*.mbox.gz
#   - Django's URL reverse in the live pod returns /hyperkitty/list/... — the
#     /hyperkitty mount is the PUBLIC serving prefix here, not merely the
#     loopback archiver-POST callback (HYPERKITTY_URL); site PR #108 exists
#     precisely because /archives/ 404s.
# Earlier revisions of docs/runbooks/list-bringup.md and
# docs/discuss-archive-packet.md presented `/archives/list/...` as the public
# path; those were stale and are corrected alongside this policy. The
# mbox-export CHALLENGE regex below is start-unanchored (`/export/...`), so it
# matches the /hyperkitty export paths regardless of mount prefix.
#
# THE EXPORT WRINKLE: HyperKitty exposes a per-list gzipped-mbox export under
# `/hyperkitty/list/<list>/export/<name>.mbox.gz`. Anonymous bulk-pulling the
# whole archive as mbox is the main cost/abuse vector on an open archive
# (large streamed responses + DB pressure). The prepended rule CHALLENGEs the
# export path for ALL user agents, placed BEFORE the crawler ALLOWs (and before
# the new read-path ALLOWs, which don't match `/export/` anyway — their
# path_regex is anchored to the list-overview and thread-permalink shapes
# only), so even an allowlisted crawler must solve a PoW to hit /export — which
# a headless crawler cannot, blocking automated bulk export while a human can
# still solve and download. Rules are evaluated top-to-bottom, first terminal
# match wins.
#
# FORMAT: v1.13.0 parses the policy as JSON only (cmd/anubis/policy.go decodes
# with encoding/json). Rule fields at v1.13.0: name / user_agent_regex /
# path_regex / action. path_regex matches r.URL.Path only (no method matcher
# at this version — same constraint already noted in
# k8s/form/.../configmap-anubis-policy.yaml for the /api/contact ALLOW). That
# means the three new read-path ALLOWs are path-scoped only, not GET-scoped;
# this is acceptable because HyperKitty's list-overview and thread views are
# read-only display endpoints that only ever respond to GET, exactly the same
# reasoning already applied to the forms carve-out. See
# k8s/form/.../configmap-anubis-policy.yaml for the format provenance notes.
#
# CURATED AI-SCRAPER DENY (depth follow-up): the stock list only DENYs amazonbot
# + the US-AI scraper. The block below adds explicit DENY rules for the well-known
# commercial LLM crawler UA tokens (GPTBot, ClaudeBot, CCBot, Bytespider,
# PerplexityBot, ...). It is placed AFTER the discuss@ read-path ALLOWs and the
# feeds/robots.txt ALLOWs — so the deliberate read-path exemption above is left
# intact (the discuss@ content is public and served ungated on
# greatfallstoolbus.org/discuss, so denying AI readers there would buy nothing) —
# and BEFORE the generic-browser CHALLENGE, so an AI crawler that hits any OTHER
# still-gated path (archive root, list search, pagination, non-discuss lists)
# gets a cheap 403 instead of a PoW interstitial, and a non-Mozilla AI UA that
# would otherwise fall through to the default ALLOW is caught. Search indexers
# (Googlebot/Bingbot/Qwant) stay ALLOWed; the mbox /export/ CHALLENGE and the
# keyholders@ posture are unchanged.
#
# DECLARE-ONLY: nothing here is applied. See README.md.
apiVersion: v1
kind: ConfigMap
metadata:
  name: anubis-archive-policy
  namespace: latoolb-us-production
  labels:
    app.kubernetes.io/name: anubis-archive
    app.kubernetes.io/component: pow-gate
data:
  botPolicies.json: |
    {
      "bots": [
        {
          "name": "hyperkitty-mbox-export",
          "path_regex": "/export/.*\\.mbox(\\.gz)?$",
          "action": "CHALLENGE"
        },
        {
          "name": "hyperkitty-discuss-list-overview",
          "path_regex": "^/hyperkitty/list/discuss@latoolb\\.us/$",
          "action": "ALLOW"
        },
        {
          "name": "hyperkitty-discuss-thread-permalinks",
          "path_regex": "^/hyperkitty/list/discuss@latoolb\\.us/thread/.*$",
          "action": "ALLOW"
        },
        {
          "name": "hyperkitty-static-assets",
          "path_regex": "^/static/.*$",
          "action": "ALLOW"
        },
        {
          "name": "amazonbot",
          "user_agent_regex": "Amazonbot",
          "action": "DENY"
        },
        {
          "name": "googlebot",
          "user_agent_regex": "\\+http\\:\\/\\/www\\.google\\.com/bot\\.html",
          "action": "ALLOW"
        },
        {
          "name": "bingbot",
          "user_agent_regex": "\\+http\\:\\/\\/www\\.bing\\.com/bingbot\\.htm",
          "action": "ALLOW"
        },
        {
          "name": "qwantbot",
          "user_agent_regex": "\\+https\\:\\/\\/help\\.qwant\\.com/bot/",
          "action": "ALLOW"
        },
        {
          "name": "us-artificial-intelligence-scraper",
          "user_agent_regex": "\\+https\\:\\/\\/github\\.com\\/US-Artificial-Intelligence\\/scraper",
          "action": "DENY"
        },
        {
          "name": "well-known",
          "path_regex": "^/.well-known/.*$",
          "action": "ALLOW"
        },
        {
          "name": "favicon",
          "path_regex": "^/favicon.ico$",
          "action": "ALLOW"
        },
        {
          "name": "robots-txt",
          "path_regex": "^/robots.txt$",
          "action": "ALLOW"
        },
        {
          "name": "rss-readers",
          "path_regex": ".*\\.(rss|xml|atom|json)$",
          "action": "ALLOW"
        },
        {
          "name": "ai-openai-gptbot",
          "user_agent_regex": "GPTBot",
          "action": "DENY"
        },
        {
          "name": "ai-openai-searchbot",
          "user_agent_regex": "OAI-SearchBot",
          "action": "DENY"
        },
        {
          "name": "ai-openai-chatgpt-user",
          "user_agent_regex": "ChatGPT-User",
          "action": "DENY"
        },
        {
          "name": "ai-anthropic-claudebot",
          "user_agent_regex": "ClaudeBot",
          "action": "DENY"
        },
        {
          "name": "ai-anthropic-ai",
          "user_agent_regex": "anthropic-ai",
          "action": "DENY"
        },
        {
          "name": "ai-anthropic-claude-web",
          "user_agent_regex": "Claude-Web",
          "action": "DENY"
        },
        {
          "name": "ai-perplexity-bot",
          "user_agent_regex": "PerplexityBot",
          "action": "DENY"
        },
        {
          "name": "ai-perplexity-user",
          "user_agent_regex": "Perplexity-User",
          "action": "DENY"
        },
        {
          "name": "ai-commoncrawl-ccbot",
          "user_agent_regex": "CCBot",
          "action": "DENY"
        },
        {
          "name": "ai-bytedance-bytespider",
          "user_agent_regex": "Bytespider",
          "action": "DENY"
        },
        {
          "name": "ai-meta-externalagent",
          "user_agent_regex": "Meta-ExternalAgent",
          "action": "DENY"
        },
        {
          "name": "ai-diffbot",
          "user_agent_regex": "Diffbot",
          "action": "DENY"
        },
        {
          "name": "ai-cohere",
          "user_agent_regex": "cohere-ai",
          "action": "DENY"
        },
        {
          "name": "ai-imagesift",
          "user_agent_regex": "ImagesiftBot",
          "action": "DENY"
        },
        {
          "name": "ai-omgili",
          "user_agent_regex": "Omgilibot",
          "action": "DENY"
        },
        {
          "name": "ai-timpi",
          "user_agent_regex": "Timpibot",
          "action": "DENY"
        },
        {
          "name": "ai-you",
          "user_agent_regex": "YouBot",
          "action": "DENY"
        },
        {
          "name": "lightpanda",
          "user_agent_regex": "^Lightpanda/.*$",
          "action": "DENY"
        },
        {
          "name": "headless-chrome",
          "user_agent_regex": "HeadlessChrome",
          "action": "DENY"
        },
        {
          "name": "headless-chromium",
          "user_agent_regex": "HeadlessChromium",
          "action": "DENY"
        },
        {
          "name": "generic-browser",
          "user_agent_regex": "Mozilla",
          "action": "CHALLENGE"
        }
      ],
      "dnsbl": true
    }
