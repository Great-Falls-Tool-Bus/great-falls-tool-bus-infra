# ClusterIP the cloudflared tunnel targets for the archive hostname
# (live hostname: lists.latoolb.us; see docs/discuss-archive-packet.md).
# anubis-archive is the ONLY component the tunnel reaches for this route; it
# fronts the HyperKitty web tier (mailman-web Service). The tunnel
# public-hostname -> this Service:8081 route is a Cloudflare-side config
# (token-managed tunnel; the ingress map lives in the Cloudflare zero-trust
# dashboard/API, NOT in this repo or a ConfigMap). That route is now added and
# live: the archive is served at lists.latoolb.us with the privacy pre-flight
# satisfied. See the README.
apiVersion: v1
kind: Service
metadata:
  name: anubis-archive
  namespace: latoolb-us-production
  labels:
    app.kubernetes.io/name: anubis-archive
    app.kubernetes.io/component: pow-gate
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: anubis-archive
  ports:
    - name: http
      port: 8081
      targetPort: http
