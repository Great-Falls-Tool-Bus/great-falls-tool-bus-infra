# DECLARE-ONLY (dispatch-gated) — NOTHING APPLIES ON MERGE (TIN-2543, ADR 0010).
#
# GFTB on-cluster web serving workload, mirroring the proven MassageIthaca
# full-on-cluster pattern (SvelteKit adapter-node -> OCI image on GHCR -> K8s
# Deployment behind a ClusterIP Service -> in-cluster cloudflared tunnel edge;
# see blahaj:tofu/stacks/massageithaca/main.tf and this repo's
# docs/decisions/0001-pr-gated-ephemeral-preview-deploys.md).
#
# ADR 0010 rules on-prem the production host and moves this stack from a parked
# fail-closed skeleton to the EXECUTING cutover (ADR 0010 §5 step 3: scale the
# web Deployment 0 -> 2). This manifest now carries the REAL cutover shape — a
# digest-pinned production image and replicas: 2 — so it is no longer inert. It
# stays DECLARE-ONLY in the honest sense that MERGING APPLIES NOTHING; the safety
# is the apply GATE plus the still-closed public path, not an inert manifest:
#   1. No CI applies on merge. web-crs.yml is validation-only; the ONLY apply is
#      web-stack.yml, which is workflow_dispatch + confirm=apply + a protected
#      web-apply-environment kubeconfig gate (fail-closed on all three).
#   2. This stack creates NO Namespace object. greatfallstoolbus-org-production is
#      provisioned out of band; the web-apply SA is namespace-scoped and cannot
#      create it (no Namespace object here — validate-web-stack.sh enforces this).
#   3. No public traffic reaches it on merge: the honey-ingress cloudflared tunnel
#      public-hostname route and apex/www DNS stay fail-closed=false in
#      ../../tofu/intent/great-falls-tool-bus/web-oncluster-route.json (TIN-991,
#      Cloudflare dashboard / token-managed, never in git). See ../README.md.
#   4. No Secret ships here (the GHCR pull secret is operator-provisioned in the
#      namespace, never committed).
#
# At dispatch web-stack.yml still `kubectl set image` / patches replicas from the
# operator-supplied inputs, so the SERVED digest is whatever the operator resolves
# at runbook P2 — which will be the PUBLIC_ARCHIVE_LIVE rebuild
# (greatfallstoolbus.org PR #111), SUPERSEDING the pin below before the actual
# dispatch. The pin below is the declarative record of the current main image.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: greatfallstoolbus-org
  namespace: greatfallstoolbus-org-production
  labels:
    app.kubernetes.io/name: greatfallstoolbus-org
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: great-falls-tool-bus
    app.tinyland.dev/lifecycle: declare-only
spec:
  # ADR 0010 §5 step 3: replicas 2 (MassageIthaca production shape). Nothing
  # schedules on merge — apply is operator-dispatch-only via web-stack.yml
  # (workflow_dispatch + confirm=apply + protected web-apply env kubeconfig).
  # Anti-affinity spreads the 2 replicas across distinct nodes (see below).
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: greatfallstoolbus-org
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: greatfallstoolbus-org
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: great-falls-tool-bus
    spec:
      terminationGracePeriodSeconds: 15
      # Pod-level hardening mirrors MI (non-root uid/gid 1001 under adapter-node).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      # Node placement. Nothing schedules on merge (apply is dispatch-gated); at
      # cutover the 2 replicas prefer the roomy nodes and spread across hosts.
      #
      # Live-probe grounding (honey rke2, 2026-07-05, read-only kubectl): pod
      # headroom is honey 138/150 (12 free — honey was EXPANDED to 150, not the
      # ~110-cap ADR 0003 assumed), bumble 50/110 (60 free), sting 96/200
      # (104 free); ~176 free cluster-wide. A replicas:2 web Deployment fits
      # trivially, but honey is the TIGHTEST node, so at cutover we PREFER
      # bumble/sting for the serving pods and keep honey as spillover.
      #
      # Serving SPOF is NONE at the pod/node layer: 3-node cluster, node-anti-
      # affinity spreads the 2 replicas across distinct hosts, and on node loss
      # they reschedule (same posture the live cloudflared replicas:2 already
      # runs). The only genuine SPOF is SITE-LEVEL (one on-prem /24: honey
      # .70.10, bumble .11, sting .12) — the honest availability tradeoff vs a
      # global CDN, already accepted by MI in production and fronted+cached by
      # Cloudflare; the named mitigation is a warm CF-Pages standby (ADR 0007).
      # The "sting SPOF" ADR 0003 cites is CI-RUNNER concentration (all ARC/nix
      # runners on sting) — a deploy-velocity concern, not a serving risk.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            # Keep off control-plane.
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
            # Prefer the roomy worker nodes (bumble/sting); honey is tightest
            # (12 free) so it stays spillover, not first choice.
            - weight: 50
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["bumble", "sting"]
        # Spread the (future) replicas across distinct nodes so a single node
        # loss never takes serving fully down — no node-SPOF.
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: greatfallstoolbus-org
                    app.kubernetes.io/component: web
      containers:
        - name: greatfallstoolbus-org
          # Digest-pinned production image (ADR 0010 §5). Built from
          # greatfallstoolbus.org main @ 592dd86 (PR #109) by container-ghcr.yml.
          # This is the current-main digest and a DECLARATIVE record only: at
          # cutover web-stack.yml `kubectl set image` overrides it with the
          # operator-resolved digest (runbook P2), which will be the
          # PUBLIC_ARCHIVE_LIVE rebuild landing from greatfallstoolbus.org PR #111
          # — that rebuild BUMPS this digest before the actual dispatch.
          image: ghcr.io/great-falls-tool-bus/greatfallstoolbus.org@sha256:3d4f066387b4234420392f0881e7c99eaf215016a99e7987f3980b52fe0c1c5e
          imagePullPolicy: IfNotPresent
          command: ["node", "build/index.js"]
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
