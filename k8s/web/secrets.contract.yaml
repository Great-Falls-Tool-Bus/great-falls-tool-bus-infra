# DECLARE-ONLY — NOT APPLIED (TIN-2541).
#
# NAMES-ONLY secrets contract for GFTB on-cluster web serving. This file
# enumerates WHAT lives WHERE across the three-layer boundary
# (site docs/decisions/0002-blahaj-substrate-boundary.md). It carries NO values,
# NO key material, NO ciphertext, NO endpoints — names, planes, and owners only.
#
# The load-bearing invariant TIN-2537 must keep: the soon-public app repo
# Great-Falls-Tool-Bus/greatfallstoolbus.org holds ZERO secrets. On-cluster
# serving does not weaken this — it lets the public repo RETIRE its one live CF
# Pages-Edit token, because the authority split (app repo owns behavior+image;
# private overlay owns the pin+apply; blahaj is the substrate) keeps every
# privileged surface out of the public repo.
contract_version: "0.1.0"
workload: greatfallstoolbus-org

planes:
  public_app_repo:
    repo: Great-Falls-Tool-Bus/greatfallstoolbus.org
    layer: 3 (declare-only, soon public)
    holds_secrets: NONE
    owns:
      - app source + svelte.config.js (adapter-node) + ContainerFile (behavior only)
      - GHCR image PUBLISH via the ambient GITHUB_TOKEN (same-org, no long-lived PAT, no cross-org secret)
      - a names-only secrets.contract.yaml (public mirror; no values)
    never_holds:
      - K8s manifests, image pins, tunnel routes, DNS records, cluster kubeconfigs
      - any Cloudflare token (on-cluster serving REMOVES the one CF Pages-Edit token this repo carries today)
      - ciphertext / age secret keys (zero, ever)

  private_overlay:
    repo: Great-Falls-Tool-Bus/great-falls-tool-bus-infra
    layer: 2 (apply-plane, private)
    holds_secrets: by-name-here / by-value only in SOPS ciphertext + protected GitHub environments
    owns:
      - the k8s/web/ Deployment/Service/NetworkPolicy manifests (this stack)
      - the operator-gated image PIN (sha-<commit>) and promotion
      - the GFTB edge/DNS apply plane (tofu/stacks/edge*) + route intent (tofu/intent/great-falls-tool-bus/)
      - tofu state + RustFS backend coordinates (creds env-delivered, never baked)
    named_secrets:
      # values live in SOPS (secrets/*.enc.yaml -> GFTB age recipient) and/or
      # protected GitHub environments; see secrets/README.md. NAMES ONLY here.
      - name: cloudflare-api-token-gftb-zones
        purpose: zone-scoped CF token (DNS/redirect/Access edit) for the GFTB zones (TIN-2385)
        plane: protected `edge` environment + SOPS
      - name: web-apply-kubeconfig
        purpose: namespace-scoped SA kubeconfig able to apply the greatfallstoolbus-org-production workload objects
        plane: protected environment
        status: not-yet-provisioned (apply fails closed on RBAC until minted)
      - name: github-pr-read-token
        purpose: fine-grained read-only Pull Requests PAT for the PARKED reaper lane (pr-env-lanes.schema.json)
        plane: operator custody; only referenced if the parked on-cluster preview lane is ever un-parked

  blahaj_substrate:
    interface: named substrate services only; no repo-tree reach
    layer: 1 (substrate; logically replaceable, "never a required dependency")
    owns:
      - the shared honey RKE2 cluster + the honey-ingress cloudflared tunnel connector
      - the cloudflared-token Secret (TUNNEL_TOKEN live in namespace cloudflared; NOT in git anywhere)
      - the RustFS tofu-state service itself
    carve_out:
      - latoolbus-dkim-private-key stays blahaj substrate-side (DNS-pinned/unrotatable, transport-consumed);
        this overlay records it BY NAME only and publishes only the public TXT half via the edge stack

github_actions_store:
  note: >
    Long-lived credentials (RustFS keys, namespace kubeconfigs, zone token) live
    in protected GitHub environments, never in any repo tree. The tunnel
    TUNNEL_TOKEN is a live cluster Secret only, never in git.

boundary_pins_note: >
  A container-producing spoke is a different shape than today's static spoke.
  The public repo's tinyland.repo.json boundaries likely need an explicit
  owns_container_image_production=true while owns_gitops_apply=false and
  owns_cloudflare_mutation=false stay false (the overlay still owns the pin +
  apply). That is a boundary-schema change a superseding hosting ADR must make
  explicitly (research brief OQ-4) — flagged here, not silently drifted.
