# Web UI service (Postorius + HyperKitty). ClusterIP only. The keyholders
# archive is private/members-only or off because access requests may carry
# personal details. A future discuss@ list can own public archive semantics.
# Tunnel route intent remains a follow-up and must preserve that privacy
# boundary (TIN-2378 apex-gate constraint).
apiVersion: v1
kind: Service
metadata:
  name: mailman-web
  namespace: latoolb-us-production
  labels:
    app.kubernetes.io/name: mailman-web
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  # Co-located (TIN-2493): the web tier is a container in the mailman-core pod,
  # so front it by selecting that pod. targetPort is the numeric 8000 (the web
  # container's HTTP socket) rather than a named port, since the combined pod
  # exposes several named ports across its two containers. External shape (8080)
  # is unchanged.
  selector:
    app.kubernetes.io/name: mailman-core
  ports:
    - name: http
      port: 8080
      targetPort: 8000
