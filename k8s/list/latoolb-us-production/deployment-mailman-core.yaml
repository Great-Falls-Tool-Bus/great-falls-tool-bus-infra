# GNU Mailman 3 core (list engine). Hosts the LMTP listener the substrate
# postfix delivers list mail to (contract capability #4, target
# mailman-core.latoolb-us-production.svc.cluster.local:8024) and runs the
# outgoing runner that submits via 587 STARTTLS + SASL (capabilities #1/#2).
#
# PIN INTENT (TIN-2380): GNU Mailman core 3.3.10. The maxking/docker-mailman
# project ships rolling image tags, not per-Mailman-version tags; the `0.5`
# line carries the 3.3.x series. Confirm the exact core version and replace the
# tag with an immutable @sha256 digest before apply (see runbook).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailman-core
  namespace: latoolb-us-production
  labels:
    app.kubernetes.io/name: mailman-core
    app.kubernetes.io/component: list-engine
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mailman-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mailman-core
        app.kubernetes.io/component: list-engine
    spec:
      securityContext:
        runAsNonRoot: false # docker-mailman entrypoint drops to mailman uid internally
        seccompProfile:
          type: RuntimeDefault
      # NOTE: the maxking/mailman-core:0.5 entrypoint GENERATES the [mta] block
      # itself from SMTP_* env vars (see the container env below) and cats it
      # into /etc/mailman.cfg. It does NOT read a MM_EXTRA_CONFIG file. An
      # earlier initContainer that rendered /etc/mailman-extra.cfg was dead code
      # (verified 2026-07-04) and has been removed in favour of the env vars.
      containers:
        - name: mailman-core
          image: ghcr.io/maxking/mailman-core:0.5
          ports:
            - name: lmtp
              containerPort: 8024
            - name: rest
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: mailman-env
          env:
            # Override the shared mailman-env DATABASE_CLASS: that value
            # (django.db.backends.postgresql) is correct for the Django web
            # tier but WRONG for core, which uses SQLAlchemy. Core crashed with
            # ModuleNotFoundError: No module named 'django' until this override.
            # An explicit env entry takes precedence over the same envFrom key.
            - name: DATABASE_CLASS
              value: mailman.database.postgresql.PostgreSQLDatabase
            # Outgoing [mta] block: the entrypoint templates these into
            # mailman.cfg. Submit to the substrate postfix over 587 STARTTLS +
            # SASL as lists-bounces@ (the tenant's own submission identity).
            # VERIFY_* off: the postfix cert is *.tinyland.dev and we connect by
            # service DNS, so hostname/cert verification cannot match; the path
            # is NetworkPolicy-scoped and TLS-encrypted regardless.
            - name: SMTP_HOST
              value: postfix.tinyland-dev-production.svc.cluster.local
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_SECURE_MODE
              value: starttls
            - name: SMTP_VERIFY_HOSTNAME
              value: "False"
            - name: SMTP_VERIFY_CERT
              value: "False"
            - name: SMTP_HOST_USER
              valueFrom:
                secretKeyRef:
                  name: lists-bounces-smtp
                  key: username
            - name: SMTP_HOST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lists-bounces-smtp
                  key: password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mailman-db
                  key: DATABASE_URL_CORE
            - name: HYPERKITTY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mailman-app
                  key: HYPERKITTY_API_KEY
            - name: MAILMAN_REST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mailman-app
                  key: MAILMAN_REST_PASSWORD
          volumeMounts:
            - name: core-data
              mountPath: /opt/mailman
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: rest
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: lmtp
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: core-data
          persistentVolumeClaim:
            claimName: mailman-core-data
