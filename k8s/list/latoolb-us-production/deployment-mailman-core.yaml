# GNU Mailman 3 core (list engine) co-located with the Mailman 3 web tier
# (Postorius + HyperKitty) in ONE pod. Hosts the LMTP listener the substrate
# postfix delivers list mail to (contract capability #4, target
# mailman-core.latoolb-us-production.svc.cluster.local:8024) and runs the
# outgoing runner that submits via 587 STARTTLS + SASL (capabilities #1/#2).
#
# CO-LOCATION (TIN-2493): mailman-web runs as a second container in this same
# pod so the HyperKitty archive POST from core travels over loopback
# (HYPERKITTY_URL -> http://127.0.0.1:8000/hyperkitty). django-mailman3 in the
# web tier trusts only the source IP in MAILMAN_ARCHIVER_FROM, which settings.py
# derives from MAILMAN_HOST_IP; pinning that to 127.0.0.1 makes the same-pod
# loopback POST trusted. This is the maxking image's native single-host
# assumption. It replaces the earlier two-Deployment shape where the POST
# arrived from the dynamic core POD IP and HyperKitty answered 403.
#
# PIN INTENT (TIN-2380): GNU Mailman core 3.3.10, Postorius 1.3.13, HyperKitty
# 1.3.12. The maxking/docker-mailman project ships rolling image tags, not
# per-Mailman-version tags; the `0.5` line carries the 3.3.x series. Confirm the
# exact versions and replace the tags with immutable @sha256 digests before
# apply (see runbook).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailman-core
  namespace: latoolb-us-production
  labels:
    app.kubernetes.io/name: mailman-core
    app.kubernetes.io/component: list-engine
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mailman-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mailman-core
        app.kubernetes.io/component: list-engine
    spec:
      securityContext:
        runAsNonRoot: false # docker-mailman entrypoint drops to mailman uid internally
        seccompProfile:
          type: RuntimeDefault
      # NOTE: the maxking/mailman-core:0.5 entrypoint GENERATES the [mta] block
      # itself from SMTP_* env vars (see the container env below) and cats it
      # into /etc/mailman.cfg. It does NOT read a MM_EXTRA_CONFIG file. An
      # earlier initContainer that rendered /etc/mailman-extra.cfg was dead code
      # (verified 2026-07-04) and has been removed in favour of the env vars.
      containers:
        - name: mailman-core
          image: ghcr.io/maxking/mailman-core:0.5@sha256:cb8e412bb18d74480f996da68f46e92473b6103995e71bc5aeba139b255cc3d2
          ports:
            - name: lmtp
              containerPort: 8024
            - name: rest
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: mailman-env
          env:
            # Override the shared mailman-env DATABASE_CLASS: that value
            # (django.db.backends.postgresql) is correct for the Django web
            # tier but WRONG for core, which uses SQLAlchemy. Core crashed with
            # ModuleNotFoundError: No module named 'django' until this override.
            # An explicit env entry takes precedence over the same envFrom key.
            - name: DATABASE_CLASS
              value: mailman.database.postgresql.PostgreSQLDatabase
            # Outgoing [mta] block: the entrypoint templates these into
            # mailman.cfg. Submit to the substrate postfix over 587 STARTTLS +
            # SASL as lists-bounces@ (the tenant's own submission identity).
            # VERIFY_* ON (#74, operator-ruled 2026-07-07): endpoint identity is
            # authenticated, not just encrypted. NetworkPolicy-acceptance of an
            # unverified context was rejected. This depends on two substrate
            # (blahaj) facts, both hard pre-apply gates in the runbook:
            #   (a) the postfix :587 listener presents a cert whose SAN covers
            #       postfix.tinyland-dev-production.svc.cluster.local — the exact
            #       name we dial (the blahaj tls-bootstrap self-signed leaf
            #       already carries this SAN; a Let's Encrypt *.tinyland.dev
            #       wildcard does NOT and must not be the 587 cert), and
            #   (b) the CA that signs it is trusted here. That CA is a PRIVATE
            #       (self-signed "Blahaj Mail CA") root, so it is NOT in the
            #       system trust store; it is mounted from the operator-owned
            #       mail-substrate-ca Secret and pointed to by SSL_CERT_FILE
            #       below. Mailman core's SMTP client builds its TLS context with
            #       ssl.create_default_context(), which honors SSL_CERT_FILE, so
            #       smtp_verify_cert/hostname=yes verify against that CA.
            - name: SMTP_HOST
              value: postfix.tinyland-dev-production.svc.cluster.local
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_SECURE_MODE
              value: starttls
            - name: SMTP_VERIFY_HOSTNAME
              value: "True"
            - name: SMTP_VERIFY_CERT
              value: "True"
            # Trust the substrate mail CA for the postfix submission hop.
            # NOTE: SSL_CERT_FILE alone is NOT sufficient for core. Proven live
            # 2026-07-09: the mailman `out` runner does not inherit this env
            # (its handshake fails chain verify while an env'd exec shell in
            # the same container verifies OK), so delivery ran on the stock
            # bundle and every send failed CERTIFICATE_VERIFY_FAILED. The
            # env-independent trust anchor is the cert.pem subPath mount below;
            # this env is kept for exec shells and any env-inheriting client.
            - name: SSL_CERT_FILE
              value: /etc/ssl/mail-substrate-ca/ca.crt
            - name: SMTP_HOST_USER
              valueFrom:
                secretKeyRef:
                  name: lists-bounces-smtp
                  key: username
            - name: SMTP_HOST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lists-bounces-smtp
                  key: password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mailman-db
                  key: DATABASE_URL_CORE
            - name: HYPERKITTY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mailman-app
                  key: HYPERKITTY_API_KEY
            - name: MAILMAN_REST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mailman-app
                  key: MAILMAN_REST_PASSWORD
          volumeMounts:
            - name: core-data
              mountPath: /opt/mailman
            # Substrate mail CA (#74): trust anchor for verified STARTTLS to
            # postfix :587. SSL_CERT_FILE (above) points at ca.crt here.
            - name: mail-substrate-ca
              mountPath: /etc/ssl/mail-substrate-ca
              readOnly: true
            # Env-independent trust anchor (#74 follow-up): overlay the image's
            # default OpenSSL cafile with the substrate CA so the mailman
            # delivery runner (which does not inherit SSL_CERT_FILE; see env
            # note above) verifies the postfix hop. Public CAs stay trusted via
            # the hashed capath (/etc/ssl/certs, untouched by this subPath).
            - name: mail-substrate-ca
              mountPath: /etc/ssl/cert.pem
              subPath: ca.crt
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: rest
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: lmtp
            initialDelaySeconds: 40
            periodSeconds: 20
        # Mailman 3 web tier: Postorius (list admin) + HyperKitty (archive),
        # served by uwsgi on 8000. Co-located here (TIN-2493) so core's archive
        # POST lands over loopback and HyperKitty's MAILMAN_ARCHIVER_FROM source
        # trust matches. Talks to core REST over the mailman-core Service (core
        # binds REST to the pod IP, not loopback, so keep the Service DNS name).
        - name: mailman-web
          image: ghcr.io/maxking/mailman-web:0.5@sha256:014726db85586fb53541f66f6ce964bf07e939791cfd5ffc796cd6d243696a18
          # The image's stock uwsgi.ini has NO static-map: docker-mailman assumes
          # a fronting webserver serves /static from the shared volume. This
          # deployment has none (Anubis proxies straight to uwsgi :8000), so
          # /static/** fell through to Django -> HTML 404s and the public archive
          # rendered bare-text (verified live 2026-07-06, TIN-2528). Override CMD
          # only (args; the docker-entrypoint.sh setup still runs) to add the
          # static-map for the collectstatic output dir.
          args:
            - uwsgi
            - --ini
            - /opt/mailman-web/uwsgi.ini
            - --static-map
            - /static=/opt/mailman-web-data/static
            # LIGHT branding (TIN-2561): serve the mounted brand stylesheet from
            # the mailman-web-branding ConfigMap the same way as /static above —
            # uwsgi offload, no collectstatic. headers.html links /brand/gftb-brand.css.
            - --static-map
            - /brand=/opt/mailman-web-branding/static
          ports:
            - name: http
              # docker-mailman's uwsgi.ini exposes the HTTP socket on 8000;
              # 8080 is not HTTP and returns EOF to HTTP probes.
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: mailman-env
          env:
            # settings.py builds MAILMAN_ARCHIVER_FROM from MAILMAN_HOST_IP.
            # Co-located (TIN-2493): core POSTs the archive over loopback
            # (HYPERKITTY_URL -> 127.0.0.1:8000), so the trusted source is
            # 127.0.0.1. Pinning MAILMAN_HOST_IP here also skips the
            # gethostbyname() on MAILMAN_HOSTNAME that NXDOMAIN-crashed the web
            # tier at import time when lists.latoolb.us had no DNS.
            - name: MAILMAN_HOST_IP
              value: "127.0.0.1"
            # LIGHT branding (TIN-2561): put the read-only branding mount on the
            # Python path so the stock settings.py `from settings_local import *`
            # (settings.py:418) resolves our settings_local.py, which prepends
            # /opt/mailman-web-branding/templates to TEMPLATES[0]['DIRS'] so the
            # hyperkitty/headers.html + top.html + bottom.html overrides win.
            - name: PYTHONPATH
              value: /opt/mailman-web-branding
            # Core binds REST to the POD IP (not loopback), and the Service
            # hairpin is broken under rke2-canal/flannel (hairpin-mode off:
            # verified live 2026-07-04, service-DNAT-to-self SYNs never return,
            # wedging every uwsgi worker). Same pod netns, so target the pod IP
            # directly via the downward API. $(POD_IP) expands because POD_IP
            # is defined earlier in this env list.
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: MAILMAN_REST_URL
              value: "http://$(POD_IP):8001"
            # 127.0.0.1 into Django ALLOWED_HOSTS so IP-host loopback requests
            # (probes, diagnostics) pass; the archive POST itself uses Host:
            # localhost which the image whitelists for the archiving API.
            # The Service FQDN is included so in-cluster REST consumers (the
            # greatfallstoolbus.org build-time /discuss fetch, TIN-2528) can dial
            # the Service DNS name without a Host-header override: without it
            # Django 400s (verified live 2026-07-06: ALLOWED_HOSTS lacked the
            # FQDN; Host: mailman-web -> 200, Host: <FQDN> -> 400).
            - name: DJANGO_ALLOWED_HOSTS
              value: "127.0.0.1,mailman-web.latoolb-us-production.svc.cluster.local"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mailman-db
                  key: DATABASE_URL_WEB
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mailman-app
                  key: DJANGO_SECRET_KEY
            - name: HYPERKITTY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mailman-app
                  key: HYPERKITTY_API_KEY
            - name: MAILMAN_REST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mailman-app
                  key: MAILMAN_REST_PASSWORD
            - name: MAILMAN_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mailman-app
                  key: MAILMAN_ADMIN_PASSWORD
            # Django outbound email (Postorius signup/confirmation, list
            # notifications). settings.py maps SMTP_USE_TLS -> EMAIL_USE_TLS and
            # SMTP_HOST_USER/PASSWORD -> EMAIL_HOST_USER/PASSWORD. SMTP_HOST/PORT
            # come from the shared mailman-env ConfigMap (postfix submission,
            # :587). Without STARTTLS the submission service rejects with
            # "530 Must issue a STARTTLS command first" and every Postorius
            # signup 500s (verified live 2026-07-06). The core container already
            # sends correctly via its own SMTP_SECURE_MODE=starttls path; this
            # gives the web tier the same STARTTLS + SASL auth, reusing the
            # lists-bounces-smtp submission identity. TLS is now VERIFIED (#74):
            # the InsecureTLSEmailBackend/CERT_NONE override is dropped from
            # settings_local.py, so Django uses its stock verified SMTP backend
            # (ssl.create_default_context()). SSL_CERT_FILE below supplies the
            # private substrate mail CA so that default context trusts postfix.
            - name: SMTP_USE_TLS
              value: "true"
            - name: SMTP_HOST_USER
              valueFrom:
                secretKeyRef:
                  name: lists-bounces-smtp
                  key: username
            - name: SMTP_HOST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lists-bounces-smtp
                  key: password
            # Trust the substrate mail CA for verified STARTTLS to postfix :587.
            # SSL_CERT_FILE replaces the default OpenSSL trust set for this
            # container's create_default_context() uses. If the web tier makes
            # OTHER verified-TLS calls, the operator builds ca.crt as the
            # substrate CA concatenated with the system roots (see runbook).
            - name: SSL_CERT_FILE
              value: /etc/ssl/mail-substrate-ca/ca.crt
          volumeMounts:
            - name: web-data
              mountPath: /opt/mailman-web-data
            # LIGHT branding (TIN-2561): templates + stylesheet + settings_local.
            - name: web-branding
              mountPath: /opt/mailman-web-branding
              readOnly: true
            # Substrate mail CA (#74): trust anchor for verified STARTTLS to
            # postfix :587; SSL_CERT_FILE (above) points at ca.crt here.
            - name: mail-substrate-ca
              mountPath: /etc/ssl/mail-substrate-ca
              readOnly: true
            # Env-independent trust anchor, mirrored from core (#74 follow-up):
            # overlay the default OpenSSL cafile so any web-tier SMTP path that
            # does not inherit SSL_CERT_FILE still verifies the postfix hop.
            # Public CAs stay trusted via the hashed capath (/etc/ssl/certs).
            - name: mail-substrate-ca
              mountPath: /etc/ssl/cert.pem
              subPath: ca.crt
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 750m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: lists.latoolb.us
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: core-data
          persistentVolumeClaim:
            claimName: mailman-core-data
        - name: web-data
          persistentVolumeClaim:
            claimName: mailman-web-data
        # Substrate mail CA trust anchor (#74). Operator-owned Secret carrying
        # the PRIVATE "Blahaj Mail CA" ca.crt (referenced by name only, no value
        # in git; see docs/runbooks/list-bringup.md + secrets/README.md). Both
        # containers mount it read-only and point SSL_CERT_FILE at ca.crt so the
        # verified STARTTLS submission to postfix :587 (SMTP_VERIFY_*=True on
        # core; stock verified Django backend on web) trusts the substrate cert.
        # The pod fails closed if this Secret is absent, which enforces the
        # pre-apply gate that the substrate SAN cert + CA are in place first.
        - name: mail-substrate-ca
          secret:
            secretName: mail-substrate-ca
            items:
              - key: ca.crt
                path: ca.crt
        # LIGHT branding (TIN-2561): mounted read-only at /opt/mailman-web-branding.
        # settings_local.py lands at the mount root (on PYTHONPATH); the templates
        # and stylesheet land under templates/hyperkitty/ and static/.
        - name: web-branding
          configMap:
            name: mailman-web-branding
            items:
              - key: settings_local.py
                path: settings_local.py
              - key: headers.html
                path: templates/hyperkitty/headers.html
              - key: top.html
                path: templates/hyperkitty/top.html
              - key: bottom.html
                path: templates/hyperkitty/bottom.html
              - key: gftb-brand.css
                path: static/gftb-brand.css
