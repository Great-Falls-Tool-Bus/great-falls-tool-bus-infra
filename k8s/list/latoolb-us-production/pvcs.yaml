# Persistent volumes for the Mailman 3 stack. Sized for a tiny community org
# (single small list). storageClassName pinned to local-path-retain: honey has
# no default StorageClass, and list DB + archive + subscriber state must
# survive a PVC reclaim (Retain), matching the house mail-data pattern
# (tinyland-dev-production mail replicas use *-retain classes).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailman-postgres-data
  namespace: latoolb-us-production
  labels:
    app.kubernetes.io/name: mailman-postgres
    app.kubernetes.io/component: database
spec:
  storageClassName: local-path-retain
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailman-core-data
  namespace: latoolb-us-production
  labels:
    app.kubernetes.io/name: mailman-core
    app.kubernetes.io/component: list-engine
spec:
  storageClassName: local-path-retain
  # Message store + queue (/opt/mailman) must survive restarts.
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailman-web-data
  namespace: latoolb-us-production
  labels:
    app.kubernetes.io/name: mailman-web
    app.kubernetes.io/component: web
spec:
  storageClassName: local-path-retain
  # HyperKitty full-text search index + collected static + uploads.
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
