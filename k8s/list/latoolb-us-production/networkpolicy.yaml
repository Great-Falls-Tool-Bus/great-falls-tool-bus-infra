# NetworkPolicies for the Mailman stack, consistent with a default-deny
# namespace posture. Each policy selects specific pods; a selected pod becomes
# default-deny for that direction except what is allowed here.
#
# CONTRACT-CRITICAL (blahaj tenant-list-engine-smtp-v0 §"Network admission on
# the incoming leg"): the substrate postfix pod is HOST-NETWORKED, so LMTP
# connections to mailman-core:8024 originate from NODE addresses, not a postfix
# podSelector. The tenant MUST admit 8024 ingress from the mail-egress node
# CIDRs and MUST NOT assume a podSelector source.
#
# PLACEHOLDER: the node CIDR below is a stand-in. Replace it with the substrate
# mail-egress node CIDR(s) — source of truth is blahaj
# dhall/render/mail-honey.dhall (node CIDRs, ~line 34) / the mail stack's own
# network-policies.tf workaround. Do NOT apply until this is the real value, or
# the incoming leg fails closed. Tracked as a pre-apply gate in the runbook.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mailman-core
  namespace: latoolb-us-production
  labels:
    app.kubernetes.io/name: mailman-core
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mailman-core
  policyTypes: [Ingress, Egress]
  ingress:
    # Substrate postfix -> LMTP 8024 (host-networked: node CIDR source).
    # 10.244.0.0/24 = blahaj postfix_host_network_node_cidrs on honey
    # (tofu/config/mail-honey.tfvars.json). On this INGRESS leg the
    # host-networked postfix's source is SNAT'd to the flannel node CIDR
    # (10.244.0.0/24), which is why this differs from the egress leg's raw
    # host IP. rke2-canal (Calico policy + flannel), not Cilium. Tightened
    # from a 10.0.0.0/8 placeholder.
    - from:
        - ipBlock:
            cidr: 10.244.0.0/24
      ports:
        - protocol: TCP
          port: 8024
    # form-handler -> LMTP 8024 (TIN-2420 Path B contact intake). The handler is
    # an in-namespace pod (NOT host-networked), so admit it by podSelector — the
    # reciprocal of the handler's egress rule in k8s/form/.../networkpolicy.yaml.
    # The ipBlock rule above is scoped to the honey-node flannel CIDR for the
    # host-networked postfix leg and must NOT be relied on for the handler, which
    # may schedule on any node (e.g. 10.244.2.0/24 on sting). Without this rule
    # the contact form's LMTP injection fails closed.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: form-handler
      ports:
        - protocol: TCP
          port: 8024
    # Web UI (Postorius/HyperKitty) HTTP 8000. Folded in from the retired
    # standalone mailman-web policy (TIN-2493): the web tier is now a container
    # in THIS pod, and the house tunnel ingress reaches it on 8000 (the
    # mailman-web Service DNATs its external 8080 -> targetPort 8000).
    # Tight to the house cloudflared namespace; the archive Anubis route adds a
    # separate podSelector admission for anubis-archive -> 8000.
    #
    # DISCUSS-SNAPSHOT READERS (greatfallstoolbus.org data plane, ADR 0010):
    # the on-site /discuss route reads the PUBLIC discuss@ archive over the
    # HyperKitty REST API on this same web tier. Two consumers are admitted as
    # additional peers on THIS SAME 8000 rule (kept as one rule so the port
    # assertion in validate-list-stack.sh stays exact — do not split into a
    # second 8000 ingress rule):
    #   - arc-runners: the tinyland-nix CI runner does the BUILD-TIME prerender
    #     fetch (prerender=true today).
    #   - greatfallstoolbus-org-production: the adapter-node site pod does the
    #     REQUEST-TIME fetch post-cutover (TIN-2543).
    # Both are scoped by the auto-applied kubernetes.io/metadata.name namespace
    # label (never the empty all-namespaces selector). This admits only READ
    # traffic to the
    # public web tier; the private keyholders@ archive is enforced by HyperKitty
    # itself (403), not by this leg, and the site data plane sources discuss@
    # ONLY and hard-fails on any other list id.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudflared
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: arc-runners
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greatfallstoolbus-org-production
      ports:
        - protocol: TCP
          port: 8000
    # Intra-pod REST (TIN-2493). The co-located web tier reaches core REST at
    # the POD IP directly (downward-API MAILMAN_REST_URL): same netns, local
    # interface, no Service hairpin (broken under flannel) and no CNI transit,
    # so NetworkPolicy does not see it. The podSelector rule below is kept as
    # defense-in-depth for any future pod-to-pod REST caller; the temporary
    # ipBlock 10.244.0.0/24 admission was removed as too broad (it admitted
    # every pod on the node to core REST).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mailman-core
      ports:
        - protocol: TCP
          port: 8001
  egress:
    - to: [] # DNS
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Outgoing submission -> substrate postfix 587 (STARTTLS + SASL).
    # postfix is HOST-NETWORKED (hostIP 192.168.70.10 on honey), so a
    # podSelector/namespaceSelector can never match it. EGRESS targets the raw
    # host LAN IP (destination is not SNAT'd), unlike the ingress leg above
    # where the host->pod source appears as the flannel CIDR 10.244.0.0/24.
    # /32 is the tightest form and matches the honey-pinned hostIP. Verified by
    # a controlled reachability test 2026-07-04 (rke2-canal, not Cilium).
    - to:
        - ipBlock:
            cidr: 192.168.70.10/32
      ports:
        - protocol: TCP
          port: 587
    # Core -> Postgres.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mailman-postgres
      ports:
        - protocol: TCP
          port: 5432
    # Intra-pod REST egress (TIN-2493). The co-located web tier calls core REST
    # through the mailman-core Service, which hairpins to this same pod. Admit
    # 8001 to self. The HyperKitty archive POST travels the OTHER way over
    # loopback (HYPERKITTY_URL = http://127.0.0.1:8000/hyperkitty), which
    # bypasses NetworkPolicy entirely, so the old Core -> Web 8080/8000 egress
    # rule is no longer needed and has been removed.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mailman-core
      ports:
        - protocol: TCP
          port: 8001
# The standalone mailman-web NetworkPolicy is gone (TIN-2493): the web tier is
# now a container in the mailman-core pod, so a policy selecting
# app.kubernetes.io/name=mailman-web would match no pods and silently do
# nothing. Its two needs are folded into the mailman-core policy above: HTTP
# 8000 ingress (tunnel/UI) and Postgres 5432 egress (already covered by core's
# Postgres egress rule, same pod). DNS is covered by core's DNS egress.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mailman-postgres
  namespace: latoolb-us-production
  labels:
    app.kubernetes.io/name: mailman-postgres
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mailman-postgres
  policyTypes: [Ingress, Egress]
  ingress:
    # Both DB clients (core + the co-located web tier) live in the mailman-core
    # pod now (TIN-2493), so a single mailman-core podSelector covers them; the
    # former separate mailman-web selector matched no pods after co-location.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mailman-core
      ports:
        - protocol: TCP
          port: 5432
  egress:
    - to: [] # DNS
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
