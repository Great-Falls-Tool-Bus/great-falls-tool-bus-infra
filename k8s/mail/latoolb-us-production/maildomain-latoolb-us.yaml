apiVersion: mail.tinyland.dev/v1alpha1
kind: MailDomain
metadata:
  name: latoolb-us
  namespace: latoolb-us-production
  labels:
    app.kubernetes.io/name: gftb-mail-domain
  annotations:
    linear.app/issue: TIN-2379
    blahaj.dev/substrate-contract: tenant-namespace-grant-v0
    greatfallstoolbus.org/intent-source: tofu/mail-intent/intent.yaml
spec:
  domain: latoolb.us
  dkimSelector: mail
  # NOTE: no dkimSecretRef by overlay doctrine (validate-mail-crs.sh: DKIM key
  # material is substrate/operator-owned). The signing key lives in the mail
  # namespace (dkim-keys/latoolb.us.mail.key, materialized 2026-07-03); the
  # controller condition DKIMReady stays False cosmetically — upstream
  # contradiction filed (controller requires same-namespace secretRef the
  # tenant lane forbids). Go/no-go = actual DKIM signature on the smoke mail.
  maxAccounts: 8
  enabled: true
