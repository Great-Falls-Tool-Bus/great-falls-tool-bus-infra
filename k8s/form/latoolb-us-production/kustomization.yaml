apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: latoolb-us-production

# GFTB contact-intake stack (TIN-2420 Path B): Anubis PoW gate -> stdlib
# form-handler -> LMTP inject to the keyholders@ Mailman list. Deployed
# overlay-side into the tenant namespace latoolb-us-production. Nothing is
# exposed until the Cloudflare tunnel public-hostname route is added
# (dashboard-side, out of band) AND a live round-trip smoke passes (see
# docs/runbooks/form-intake.md).

resources:
  - configmap-form-handler.yaml
  - deployment-form-handler.yaml
  - service-form-handler.yaml
  - deployment-anubis.yaml
  - service-anubis.yaml
  - networkpolicy.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/managed-by: great-falls-tool-bus-infra
      app.kubernetes.io/part-of: great-falls-tool-bus
      app.tinyland.dev/tenant: great-falls-tool-bus
