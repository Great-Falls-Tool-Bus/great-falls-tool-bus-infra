# TIN-2420 Path B — form-handler application source, mounted read-only into the
# python:3.12-alpine container. Stdlib ONLY (no pip, no wheels): http.server for
# the listener and smtplib.LMTP for delivery, so the image stays the pinned
# upstream python with zero supply-chain surface of our own.
#
# Contract (COMMON, ratified 2026-07-04):
#   - POST /api/contact  {name,email,message,website}  (website = honeypot)
#   - delivers a DMARC-safe RFC822 message via LMTP to
#     mailman-core.latoolb-us-production.svc.cluster.local:8024
#     To: keyholders@latoolb.us  (list accepts non-member posts BY DESIGN;
#     the fan-out to every keyholder is the feature)
#   - From: "Tool Bus contact form" <form-intake@latoolb.us>  (domain aligns
#     with latoolb.us DKIM signed substrate-side on the 587 fan-out leg)
#   - Reply-To: the visitor's address; X-GFTB-Form: contact
#   - CORS: ONLY https://greatfallstoolbus.org (the static site origin)
#
# Anti-abuse is layered: Anubis PoW fronts this handler (only anubis may reach
# :8080, see networkpolicy.yaml); the in-process token bucket and honeypot are
# defense-in-depth, not the primary gate.
apiVersion: v1
kind: ConfigMap
metadata:
  name: form-handler-src
  namespace: latoolb-us-production
  labels:
    app.kubernetes.io/name: form-handler
    app.kubernetes.io/component: contact-intake
data:
  server.py: |
    #!/usr/bin/env python3
    """GFTB contact form intake (TIN-2420 Path B). Stdlib only.

    Accepts a small JSON contact payload behind the Anubis PoW gate, validates
    it, rate-limits per client, builds a DMARC-safe message, and injects it over
    LMTP to the keyholders@ Mailman list, which fans out to every keyholder.
    """
    from __future__ import annotations

    import json
    import os
    import re
    import smtplib
    import sys
    import threading
    import time
    from email.message import EmailMessage
    from email.utils import formatdate, make_msgid
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    # --- Configuration (env, with contract defaults) -----------------------------
    BIND_HOST = os.environ.get("FORM_BIND_HOST", "0.0.0.0")
    BIND_PORT = int(os.environ.get("FORM_BIND_PORT", "8080"))
    LMTP_HOST = os.environ.get("LMTP_HOST", "mailman-core.latoolb-us-production.svc.cluster.local")
    LMTP_PORT = int(os.environ.get("LMTP_PORT", "8024"))
    # DMARC-safe envelope + header identities. From aligns with latoolb.us so the
    # substrate DKIM signer covers the fan-out leg; Return-Path (LMTP MAIL FROM)
    # matches so any bounce is well-formed. Reply-To is set per-request.
    MAIL_FROM = os.environ.get("FORM_MAIL_FROM", "form-intake@latoolb.us")
    MAIL_FROM_NAME = os.environ.get("FORM_MAIL_FROM_NAME", "Tool Bus contact form")
    MAIL_TO = os.environ.get("FORM_MAIL_TO", "keyholders@latoolb.us")
    # CORS: the static site origin ONLY. Nothing else may script this endpoint.
    ALLOWED_ORIGIN = os.environ.get("FORM_ALLOWED_ORIGIN", "https://greatfallstoolbus.org")

    # Validation bounds.
    NAME_MAX = 200
    EMAIL_MAX = 254
    MESSAGE_MIN = 1
    MESSAGE_MAX = 5000
    BODY_MAX_BYTES = 64 * 1024  # cap request body so a client cannot exhaust RAM

    # Token bucket: 5 requests/minute/client, refilled continuously.
    BUCKET_CAPACITY = int(os.environ.get("FORM_RATE_BURST", "5"))
    BUCKET_REFILL_PER_SEC = float(os.environ.get("FORM_RATE_REFILL_PER_SEC", str(5.0 / 60.0)))

    # RFC 5322-ish addr-spec: pragmatic, not exhaustive. We only need to reject
    # obviously bad input and header-injection attempts; the real deliverability
    # check is the list accepting the post.
    EMAIL_RE = re.compile(r"^[^@\s]+@[^@\s.]+(?:\.[^@\s.]+)+$")


    class TokenBucket:
        """Per-key continuous-refill token bucket (in-memory, single replica)."""

        def __init__(self, capacity: int, refill_per_sec: float) -> None:
            self.capacity = capacity
            self.refill = refill_per_sec
            self._state: dict[str, tuple[float, float]] = {}
            self._lock = threading.Lock()

        def allow(self, key: str) -> bool:
            now = time.monotonic()
            with self._lock:
                tokens, last = self._state.get(key, (float(self.capacity), now))
                tokens = min(self.capacity, tokens + (now - last) * self.refill)
                if tokens < 1.0:
                    self._state[key] = (tokens, now)
                    return False
                self._state[key] = (tokens - 1.0, now)
                # Opportunistic sweep so the dict cannot grow without bound.
                if len(self._state) > 4096:
                    cutoff = now - 3600
                    self._state = {
                        k: v for k, v in self._state.items() if v[1] > cutoff
                    }
                return True


    BUCKET = TokenBucket(BUCKET_CAPACITY, BUCKET_REFILL_PER_SEC)


    def _client_key(handler: "Handler") -> str:
        # Behind Anubis + cloudflared the socket peer is a proxy, so prefer the
        # left-most X-Forwarded-For hop for per-visitor fairness. Spoofable, but
        # this bucket is defense-in-depth behind the PoW gate, not the gate.
        xff = handler.headers.get("X-Forwarded-For", "")
        if xff:
            return xff.split(",")[0].strip()
        return handler.client_address[0]


    def _sanitize_header(value: str) -> str:
        # Strip CR/LF to defeat header injection before values reach any header.
        return value.replace("\r", " ").replace("\n", " ").strip()


    def validate(payload: dict) -> tuple[dict | None, str | None]:
        if not isinstance(payload, dict):
            return None, "malformed payload"
        # Honeypot: a real browser leaves 'website' empty. Bots fill every field.
        honeypot = payload.get("website", "")
        if isinstance(honeypot, str) and honeypot.strip():
            return None, "honeypot"  # caller turns this into a silent success
        name = payload.get("name", "")
        email = payload.get("email", "")
        message = payload.get("message", "")
        if not all(isinstance(v, str) for v in (name, email, message)):
            return None, "fields must be strings"
        name = name.strip()
        email = email.strip()
        message = message.strip()
        if not name or len(name) > NAME_MAX:
            return None, "name must be 1..%d characters" % NAME_MAX
        if len(email) > EMAIL_MAX or not EMAIL_RE.match(email):
            return None, "a valid email is required"
        if len(message) < MESSAGE_MIN or len(message) > MESSAGE_MAX:
            return None, "message must be 1..%d characters" % MESSAGE_MAX
        return {"name": name, "email": email, "message": message}, None


    def build_message(fields: dict, client_key: str) -> EmailMessage:
        name = _sanitize_header(fields["name"])
        email = _sanitize_header(fields["email"])
        msg = EmailMessage()
        msg["From"] = '%s <%s>' % (MAIL_FROM_NAME, MAIL_FROM)
        msg["To"] = MAIL_TO
        msg["Reply-To"] = email
        msg["Subject"] = "Tool Bus contact: %s" % name
        msg["Date"] = formatdate(localtime=False)
        msg["Message-ID"] = make_msgid(domain=MAIL_FROM.split("@", 1)[-1])
        msg["X-GFTB-Form"] = "contact"
        msg["Auto-Submitted"] = "auto-generated"
        body = (
            "New contact submission from the Great Falls Tool Bus website.\n\n"
            "Name:    %s\n"
            "Email:   %s\n"
            "Source:  %s\n\n"
            "Message:\n%s\n"
        ) % (name, email, client_key, fields["message"])
        msg.set_content(body)
        return msg


    def deliver(msg: EmailMessage) -> None:
        # LMTP injection: no SMTP credential. The keyholders list accepts
        # non-member posts by design; the outbound fan-out rides the certified
        # 587/SASL + DKIM path substrate-side.
        client = smtplib.LMTP(LMTP_HOST, LMTP_PORT, timeout=10)
        try:
            client.sendmail(MAIL_FROM, [MAIL_TO], msg.as_bytes())
        finally:
            try:
                client.quit()
            except Exception:
                client.close()


    class Handler(BaseHTTPRequestHandler):
        server_version = "gftb-form-intake/1"
        protocol_version = "HTTP/1.1"

        def log_message(self, fmt, *args):  # structured-ish stdout, no PII body
            sys.stdout.write("%s - %s\n" % (self.address_string(), fmt % args))

        def _cors_origin(self) -> str | None:
            origin = self.headers.get("Origin")
            return ALLOWED_ORIGIN if origin == ALLOWED_ORIGIN else None

        def _send_json(self, status: int, obj: dict, extra_cors: bool = True):
            payload = json.dumps(obj).encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(payload)))
            if extra_cors:
                allow = self._cors_origin()
                if allow:
                    self.send_header("Access-Control-Allow-Origin", allow)
                    self.send_header("Vary", "Origin")
            self.end_headers()
            self.wfile.write(payload)

        def do_GET(self):
            if self.path == "/healthz":
                self._send_json(200, {"ok": True}, extra_cors=False)
                return
            self._send_json(404, {"ok": False, "error": "not found"})

        def do_OPTIONS(self):
            # CORS preflight for the POST.
            allow = self._cors_origin()
            if self.path == "/api/contact" and allow:
                self.send_response(204)
                self.send_header("Access-Control-Allow-Origin", allow)
                self.send_header("Access-Control-Allow-Methods", "POST, OPTIONS")
                self.send_header("Access-Control-Allow-Headers", "Content-Type")
                self.send_header("Access-Control-Max-Age", "600")
                self.send_header("Vary", "Origin")
                self.send_header("Content-Length", "0")
                self.end_headers()
                return
            self.send_response(403)
            self.send_header("Content-Length", "0")
            self.end_headers()

        def do_POST(self):
            if self.path != "/api/contact":
                self._send_json(404, {"ok": False, "error": "not found"})
                return
            client_key = _client_key(self)
            if not BUCKET.allow(client_key):
                self._send_json(429, {"ok": False, "error": "rate limited"})
                return
            try:
                length = int(self.headers.get("Content-Length", "0"))
            except ValueError:
                self._send_json(400, {"ok": False, "error": "bad length"})
                return
            if length <= 0 or length > BODY_MAX_BYTES:
                self._send_json(413, {"ok": False, "error": "payload too large"})
                return
            raw = self.rfile.read(length)
            try:
                payload = json.loads(raw.decode("utf-8"))
            except (ValueError, UnicodeDecodeError):
                self._send_json(400, {"ok": False, "error": "invalid JSON"})
                return
            fields, err = validate(payload)
            if err == "honeypot":
                # Do not tip off the bot: pretend success, send nothing.
                self._send_json(200, {"ok": True})
                return
            if err:
                self._send_json(400, {"ok": False, "error": err})
                return
            try:
                deliver(build_message(fields, client_key))
            except Exception as exc:  # noqa: BLE001 - surface a generic failure
                sys.stderr.write("delivery failed: %r\n" % (exc,))
                self._send_json(502, {"ok": False, "error": "delivery failed"})
                return
            self._send_json(200, {"ok": True})


    def main() -> int:
        server = ThreadingHTTPServer((BIND_HOST, BIND_PORT), Handler)
        sys.stdout.write(
            "form-handler listening on %s:%d -> LMTP %s:%d\n"
            % (BIND_HOST, BIND_PORT, LMTP_HOST, LMTP_PORT)
        )
        sys.stdout.flush()
        try:
            server.serve_forever()
        except KeyboardInterrupt:
            pass
        finally:
            server.server_close()
        return 0


    if __name__ == "__main__":
        raise SystemExit(main())
