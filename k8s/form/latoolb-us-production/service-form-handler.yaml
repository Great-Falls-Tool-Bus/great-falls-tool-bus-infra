# ClusterIP for the form-handler. Reachable ONLY from the Anubis pod (enforced
# by networkpolicy.yaml); never exposed through the tunnel. Anubis proxies to
# http://form-handler:8080.
apiVersion: v1
kind: Service
metadata:
  name: form-handler
  namespace: latoolb-us-production
  labels:
    app.kubernetes.io/name: form-handler
    app.kubernetes.io/component: contact-intake
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: form-handler
  ports:
    - name: http
      port: 8080
      targetPort: http
