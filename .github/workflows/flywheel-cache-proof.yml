name: Flywheel org-tenancy cache proof

# Declare-only pre-soak lane for the GloriousFlywheel L5 org-mint activation
# (TIN-2364). It exchanges this repo's GitHub Actions OIDC identity for a
# gf-reapi-cell profile and runs a cache-backed, READ-ONLY Bazel round-trip
# routed to remote_instance_name=org-great-falls-tool-bus, giving the operator a
# real lane to observe during the cache-read pilot soak.
#
# INERT until activation + cell rollout: while runtime_grants_enabled is off for
# this repo the exchange mints the prior read-only default, and the shared cache
# / exchange front door are not yet on the runner, so the driver logs a loud
# notice and exits 0. The org tenant is activated and the round-trip proven
# (TIN-2364 soak, 2026-07-09), so this lane is now ENFORCING: a failed exchange
# or cache round-trip fails CI.
#
# Endpoint authority is fleet-runtime env, never in this YAML: nix-setup exports
# BAZEL_REMOTE_CACHE from cluster DNS, and GF_REAPI_TOKEN_EXCHANGE_ENDPOINT comes
# from the fleet profile.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: flywheel-cache-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cache-proof:
    name: flywheel-cache-proof (org-great-falls-tool-bus)
    runs-on: tinyland-nix
    timeout-minutes: 15
    env:
      GFW_EXPECTED_INSTANCE_NAME: org-great-falls-tool-bus
    steps:
      - name: Checkout overlay
        uses: actions/checkout@v6

      # Endpoint-free cache attach. nix-setup derives BAZEL_REMOTE_CACHE from
      # cluster DNS reachability (it invents no endpoint) and adds Nix to PATH.
      # Non-fatal: off-cluster / pre-rollout it warns and the driver stays inert.
      - name: Attach shared Bazel cache (fleet runtime env)
        id: cache-setup
        continue-on-error: true
        uses: tinyland-inc/ci-templates/.github/actions/nix-setup@v2

      - name: Fallback Nix on PATH
        if: steps.cache-setup.outcome != 'success'
        shell: bash
        run: |
          for nixbin in /nix/var/nix/profiles/default/bin "${HOME}/.nix-profile/bin"; do
            [ -d "${nixbin}" ] && echo "${nixbin}" >> "${GITHUB_PATH}"
          done

      # Install the fleet token-exchange front door, pinned to the L5
      # activation keystone commit and content-verified before it is trusted on
      # PATH. The cache-proof driver locates flywheel-github-oidc-profile via
      # command -v, so this step is what enables the OIDC exchange on the
      # runner. A hash mismatch fails this step and, now that the lane is
      # enforcing, fails CI.
      - name: Install fleet OIDC front door (pinned)
        shell: bash
        env:
          GF_OIDC_PROFILE_REF: df510574d17b85e7f15470caf3574fcabc4768f1
          GF_OIDC_PROFILE_SHA256: 0aa1bb2b1814c28d6162fc91d5cb3201ecaa13775e94ab3571db776d5dcc3ba8
        run: |
          set -euo pipefail
          tools_dir="${RUNNER_TEMP}/gf-tools"
          dest="${tools_dir}/flywheel-github-oidc-profile"
          url="https://raw.githubusercontent.com/tinyland-inc/GloriousFlywheel/${GF_OIDC_PROFILE_REF}/scripts/flywheel-github-oidc-profile.sh"
          mkdir -p "${tools_dir}"
          curl --fail --silent --show-error --location "${url}" --output "${dest}"
          actual="$(sha256sum "${dest}" | awk '{ print $1 }')"
          if [ "${actual}" != "${GF_OIDC_PROFILE_SHA256}" ]; then
            echo "::error::flywheel-github-oidc-profile sha256 mismatch: expected ${GF_OIDC_PROFILE_SHA256}, got ${actual}"
            exit 1
          fi
          chmod +x "${dest}"
          # The minted cache-read profile points Bazel at gf-reapi-credhelper
          # (resolved by PATH lookup). Build it from the same pinned core ref;
          # the flake output is commit-pinned and the runner Attic substituter
          # serves the fleet-built artifact when warm.
          if ! command -v gf-reapi-credhelper >/dev/null 2>&1; then
            nix build "github:tinyland-inc/GloriousFlywheel/${GF_OIDC_PROFILE_REF}#gf-reapi-credhelper" \
              --out-link "${RUNNER_TEMP}/gf-credhelper"
            ln -sf "$(readlink -f "${RUNNER_TEMP}/gf-credhelper")/bin/gf-reapi-credhelper" \
              "${tools_dir}/gf-reapi-credhelper"
          fi
          echo "${tools_dir}" >> "${GITHUB_PATH}"
          echo "installed pinned flywheel-github-oidc-profile (sha256 ${actual})"

      - name: Cache-backed org-tenancy Bazel proof (read-only)
        shell: bash
        run: |
          set -uo pipefail
          if command -v nix >/dev/null 2>&1; then
            nix develop . --command just flywheel-cache-proof
          else
            echo "::warning::nix unavailable on runner; org-tenancy cache proof skipped (inert pre-activation)."
          fi
