name: Web Stack

# TIN-2541: GFTB on-cluster web serving DECLARE-ONLY skeleton (SvelteKit
# adapter-node -> ClusterIP 80->3000 -> honey-ingress cloudflared tunnel,
# mirroring the MassageIthaca full-on-cluster pattern).
#
# This workflow is VALIDATION-ONLY. It runs the repo validator, including the
# render check, and enforces the fail-closed invariants (replicas 0, placeholder
# image, no namespace, no secret, fail-closed route/reaper intent).
# There is intentionally NO server-dry-run/apply job: applying this skeleton is
# not a supported operation. A live cutover is operator-gated under a superseding
# hosting ADR, out of band. See k8s/web/README.md and
# docs/decisions/0001-pr-gated-ephemeral-preview-deploys.md.

on:
  pull_request:
    paths:
      - ".github/workflows/web-crs.yml"
      - "Justfile"
      - "k8s/web/**"
      - "scripts/validate-web-stack.sh"
      - "tofu/intent/great-falls-tool-bus/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/web-crs.yml"
      - "Justfile"
      - "k8s/web/**"
      - "scripts/validate-web-stack.sh"
      - "tofu/intent/great-falls-tool-bus/**"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  GF_CORE_REF: 2281b576bce0e8dd776a047b84e7464f5b508a62

jobs:
  validate:
    name: Validate web stack (declare-only)
    runs-on: tinyland-nix
    steps:
      - name: Checkout overlay
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: overlay
          persist-credentials: false
      - name: Checkout public GloriousFlywheel core
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: tinyland-inc/GloriousFlywheel
          ref: ${{ env.GF_CORE_REF }}
          path: GloriousFlywheel
          persist-credentials: false
      - name: Verify GloriousFlywheel core checkout
        run: |
          set -euo pipefail
          actual="$(git -C GloriousFlywheel rev-parse --verify HEAD)"
          if [ "${actual}" != "${GF_CORE_REF}" ]; then
            echo "::error::GloriousFlywheel checkout mismatch: expected ${GF_CORE_REF}, got ${actual}"
            exit 1
          fi
      - name: Validate manifests
        uses: ./GloriousFlywheel/.github/actions/nix-job
        with:
          push-cache: "false"
          command: |
            set -euo pipefail
            cd overlay
            export GF_CORE_PATH=../GloriousFlywheel
            export GF_CORE_CI_PATH="github:tinyland-inc/GloriousFlywheel/${GF_CORE_REF}#ci"
            nix develop "${GF_CORE_CI_PATH}" -c just web-stack-validate
