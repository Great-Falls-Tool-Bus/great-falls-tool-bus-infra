name: Web Stack Apply

# APPLY companion to the declare-only VALIDATE workflow web-crs.yml (TIN-2543,
# authorized by ADR docs/decisions/0008-oncluster-web-serving.md; procedure in
# docs/runbooks/oncluster-web-cutover.md). web-crs.yml validates the parked
# k8s/web skeleton and NEVER applies; THIS workflow is the single operator
# dispatch that cuts greatfallstoolbus.org over to on-cluster serving (SvelteKit
# adapter-node -> ClusterIP 80->3000 -> honey-ingress cloudflared tunnel),
# mirroring the mail-crs.yml / edge-plan.yml apply chassis (runs-on tinyland-nix,
# GF-core checkout, protected environment, fail-closed secret gate).
#
# FAIL-CLOSED, OPERATOR-DISPATCH-ONLY:
#   * No push/PR triggers. workflow_dispatch only.
#   * A required `confirm` input must equal the sentinel `apply`; any other value
#     aborts before the cluster is touched.
#   * Requires the GF core read credential gate AND the operator-minted
#     web-apply-kubeconfig, stored as WEB_APPLY_KUBECONFIG_B64 in the protected
#     `web-apply` environment. Absent either => ::error:: + exit; nothing applies.
#     The kubeconfig is a namespace-scoped ServiceAccount able to apply the
#     greatfallstoolbus-org-production workload objects ONLY; apply fails closed
#     on RBAC until the operator mints that SA (k8s/web/secrets.contract.yaml).
#   * The image digest is NOT committed: the operator passes the resolved
#     ghcr.io/great-falls-tool-bus/greatfallstoolbus.org:sha-<commit> reference
#     (ideally @sha256:<digest>) as the `image` input at dispatch (runbook P2),
#     so the public tree stays declare-only. scripts/validate-web-stack.sh keeps
#     the k8s/web overlay at replicas:0 + placeholder image + no namespace.
#
# WHAT IT APPLIES (runbook P3): kubectl-apply the workload kustomization
# (Deployment + Service + NetworkPolicy) into the ALREADY-PROVISIONED
# greatfallstoolbus-org-production namespace (the web-apply SA is namespace-scoped
# and cannot create namespaces), pin the operator-supplied image, flip replicas
# 0 -> N, wait for the rollout, and report the in-cluster health gate. The live
# kubectl mutation lives in the audited `just web-stack-apply` recipe, not inline
# here (the public-operator-surface contract keeps workflows calling Justfile
# recipes, never raw kubectl apply).
#
# OUT OF SCOPE, still SEPARATE operator steps: the cloudflared public-hostname
# route (runbook P5, dashboard/token-managed), the apex+www DNS flip CF Pages ->
# tunnel (runbook P6, via edge-plan.yml action=apply), and the CF Pages
# decommission (runbook P7). This workflow moves NOTHING public: up to and
# including its health gate the site is still served by CF Pages.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'apply' to authorize the on-cluster web cutover. Any other value aborts (fail-closed)."
        required: true
        default: ""
        type: string
      image:
        description: "Digest-pinned image to serve, e.g. ghcr.io/great-falls-tool-bus/greatfallstoolbus.org@sha256:<digest> (operator-resolved at runbook P2; never committed)."
        required: true
        default: ""
        type: string
      replicas:
        description: "Replica count to scale to at cutover (MassageIthaca production shape is 2)."
        required: false
        default: "2"
        type: string
  # CONTINUOUS DEPLOYMENT trigger (merge-on-green == live). The SITE repo
  # greatfallstoolbus.org fires this repository_dispatch from its
  # container-ghcr.yml AFTER a green push-to-main image build+push. The site
  # SIGNALS; this infra repo APPLIES — the security boundary is unchanged: the
  # site never holds cluster/edge creds, and every fail-closed gate below still
  # runs. client_payload contract (must match the SITE signal job):
  #   image     ghcr.io/great-falls-tool-bus/greatfallstoolbus.org@sha256:<digest>
  #   sha       the main-branch commit SHA that produced the image
  #   replicas  desired replica count (string; default "2")
  # Before applying, the CD path GATES ON CI GREEN: it verifies the SITE repo's
  # ci.yml run for `sha` concluded success (web-cd-ci-green-gate). The manual
  # workflow_dispatch path above is preserved intact for rollback/override to an
  # arbitrary prior digest.
  repository_dispatch:
    types: [web-image-published]

permissions:
  contents: read

concurrency:
  # Never cancel an in-flight apply; serialize cutover dispatches per ref.
  group: web-stack-apply-${{ github.ref }}
  cancel-in-progress: false

env:
  GF_CORE_REF: 2281b576bce0e8dd776a047b84e7464f5b508a62
  HAS_GF_CORE_DEPLOY_KEY: ${{ secrets.GF_CORE_DEPLOY_KEY != '' }}
  HAS_GF_CORE_READ_TOKEN: ${{ secrets.GF_CORE_READ_TOKEN != '' }}
  HAS_WEB_APPLY_KUBECONFIG: ${{ secrets.WEB_APPLY_KUBECONFIG_B64 != '' }}

jobs:
  apply:
    name: Apply web stack (on-cluster cutover)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: tinyland-nix
    # The web-apply kubeconfig secret lives ONLY in this protected `web-apply`
    # environment, not at repository scope (mirrors mail-crs.yml `mail` and
    # edge-plan.yml `edge`). Required-reviewer branch policies are a GitHub
    # paid-plan feature not available on this free community org; the effective
    # apply gate is workflow_dispatch + confirm=apply + the fail-closed secret
    # gate below (operator decision 2026-07-03, see edge-plan.yml).
    environment: web-apply
    timeout-minutes: 30
    steps:
      - name: Resolve deploy parameters (manual dispatch vs CD signal)
        # Normalize the two trigger shapes into one set of job env vars consumed
        # by every downstream step, so the apply chassis stays single-sourced.
        # workflow_dispatch -> github.event.inputs.*; repository_dispatch (CD) ->
        # github.event.client_payload.*.
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_IMAGE: ${{ github.event.inputs.image }}
          DISPATCH_REPLICAS: ${{ github.event.inputs.replicas }}
          CD_IMAGE: ${{ github.event.client_payload.image }}
          CD_SHA: ${{ github.event.client_payload.sha }}
          CD_REPLICAS: ${{ github.event.client_payload.replicas }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "repository_dispatch" ]]; then
            image="${CD_IMAGE}"
            replicas="${CD_REPLICAS:-2}"
            sha="${CD_SHA}"
            mode="cd"
          else
            image="${DISPATCH_IMAGE}"
            replicas="${DISPATCH_REPLICAS:-2}"
            sha=""
            mode="manual"
          fi
          {
            echo "WEB_APPLY_IMAGE=${image}"
            echo "WEB_APPLY_REPLICAS=${replicas}"
            echo "WEB_APPLY_SHA=${sha}"
            echo "WEB_DEPLOY_MODE=${mode}"
          } >> "${GITHUB_ENV}"
          echo "Deploy mode: ${mode}; replicas: ${replicas}; image: ${image:-<unset>}"

      - name: Confirm apply intent (fail-closed sentinel)
        # Manual operator path only. The CD path's authorization is the CI-green
        # gate below (merge-on-green), not this typed sentinel.
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "apply" ]]; then
            echo "::error::Refusing to apply: set confirm=apply to authorize the on-cluster web cutover (fail-closed, operator-dispatch-only)."
            exit 1
          fi

      - name: Require GloriousFlywheel core read credential
        run: |
          if [[ "${HAS_GF_CORE_DEPLOY_KEY}" != "true" && "${HAS_GF_CORE_READ_TOKEN}" != "true" ]]; then
            echo "::error::GF_CORE_DEPLOY_KEY or GF_CORE_READ_TOKEN is required."
            exit 1
          fi

      - name: Require web-apply kubeconfig secret
        run: |
          if [[ "${HAS_WEB_APPLY_KUBECONFIG}" != "true" ]]; then
            echo "::error::WEB_APPLY_KUBECONFIG_B64 is required in the protected web-apply environment; it is the namespace-scoped SA kubeconfig that applies the greatfallstoolbus-org-production workload. Mint the SA + RBAC and provision the secret before dispatch (k8s/web/secrets.contract.yaml, docs/runbooks/oncluster-web-cutover.md)."
            exit 1
          fi

      - name: Validate image input (digest-pinned, not the placeholder)
        env:
          WEB_APPLY_IMAGE: ${{ env.WEB_APPLY_IMAGE }}
        run: |
          set -euo pipefail
          if [[ -z "${WEB_APPLY_IMAGE}" ]]; then
            echo "::error::image input is required (the operator-resolved GHCR reference to serve)."
            exit 1
          fi
          case "${WEB_APPLY_IMAGE}" in
            *PLACEHOLDER*)
              echo "::error::refusing the declare-only PLACEHOLDER image; supply the real operator-resolved GHCR reference."
              exit 1
              ;;
          esac
          case "${WEB_APPLY_IMAGE}" in
            *@sha256:*) : ;;
            *) echo "::warning::image is not digest-pinned (@sha256:<digest>); a tag is mutable. Prefer the resolved digest (runbook P2)." ;;
          esac

      - name: Checkout overlay
        uses: actions/checkout@v6
        with:
          path: overlay

      - name: Checkout GloriousFlywheel core with deploy key
        if: env.HAS_GF_CORE_DEPLOY_KEY == 'true'
        uses: actions/checkout@v6
        with:
          repository: tinyland-inc/GloriousFlywheel
          ref: ${{ env.GF_CORE_REF }}
          path: GloriousFlywheel
          ssh-key: ${{ secrets.GF_CORE_DEPLOY_KEY }}

      - name: Checkout GloriousFlywheel core with read token
        if: env.HAS_GF_CORE_DEPLOY_KEY != 'true' && env.HAS_GF_CORE_READ_TOKEN == 'true'
        uses: actions/checkout@v6
        with:
          repository: tinyland-inc/GloriousFlywheel
          ref: ${{ env.GF_CORE_REF }}
          path: GloriousFlywheel
          token: ${{ secrets.GF_CORE_READ_TOKEN }}

      # CD-only "merge on green" gate. Runs BEFORE any cluster touch (dry-run /
      # apply below): the deploy proceeds only if the SITE repo's ci.yml for the
      # dispatched commit concluded success. Read-only cross-repo check via the
      # infra devshell (gh + jq); the site repo is PUBLIC so its CI run metadata
      # is world-readable — GF_CORE_READ_TOKEN is used when present, else the
      # ambient GITHUB_TOKEN suffices. The manual workflow_dispatch path skips
      # this gate (its authorization is confirm=apply).
      - name: CI-green gate (SITE ci.yml success for this commit) [CD only]
        if: github.event_name == 'repository_dispatch'
        uses: ./GloriousFlywheel/.github/actions/nix-job
        env:
          GH_TOKEN: ${{ secrets.GF_CORE_READ_TOKEN != '' && secrets.GF_CORE_READ_TOKEN || secrets.GITHUB_TOKEN }}
          CI_GREEN_SHA: ${{ github.event.client_payload.sha }}
          CI_GREEN_REPO: ${{ github.repository_owner }}/greatfallstoolbus.org
        with:
          push-cache: "false"
          command: |
            set -euo pipefail
            cd overlay
            nix develop . -c just web-cd-ci-green-gate

      - name: Materialize web-apply kubeconfig
        env:
          WEB_APPLY_KUBECONFIG_B64: ${{ secrets.WEB_APPLY_KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          kubeconfig="${RUNNER_TEMP}/web-apply.kubeconfig"
          printf '%s' "${WEB_APPLY_KUBECONFIG_B64}" | base64 -d > "${kubeconfig}"
          chmod 600 "${kubeconfig}"
          echo "WEB_APPLY_KUBECONFIG=${kubeconfig}" >> "$GITHUB_ENV"

      # The web-apply kubeconfig points the API server at the cluster tailnet
      # address (100.x:6443); the on-cluster tinyland-nix runner reaches it over
      # Tailscale like other cluster ops. If tailnet egress is unavailable, the
      # in-cluster fallback is to rewrite the server to
      # https://kubernetes.default.svc (the config set-cluster rewrite mail-crs.yml
      # performs); it is intentionally left off here because the tailnet path is
      # the supported route for this SA kubeconfig.
      - name: Server dry-run (workload apply)
        uses: ./GloriousFlywheel/.github/actions/nix-job
        env:
          WEB_APPLY_IMAGE: ${{ env.WEB_APPLY_IMAGE }}
          WEB_APPLY_REPLICAS: ${{ env.WEB_APPLY_REPLICAS }}
        with:
          push-cache: "false"
          command: |
            set -euo pipefail
            cd overlay
            export GF_CORE_PATH=../GloriousFlywheel
            export GF_CORE_CI_PATH="github:tinyland-inc/GloriousFlywheel/${GF_CORE_REF}#ci"
            nix develop "${GF_CORE_CI_PATH}" -c just web-stack-server-dry-run

      - name: Apply cutover (namespace exists; pin image, flip replicas 0 -> N)
        uses: ./GloriousFlywheel/.github/actions/nix-job
        env:
          WEB_APPLY_IMAGE: ${{ env.WEB_APPLY_IMAGE }}
          WEB_APPLY_REPLICAS: ${{ env.WEB_APPLY_REPLICAS }}
        with:
          push-cache: "false"
          command: |
            set -euo pipefail
            cd overlay
            export GF_CORE_PATH=../GloriousFlywheel
            export GF_CORE_CI_PATH="github:tinyland-inc/GloriousFlywheel/${GF_CORE_REF}#ci"
            nix develop "${GF_CORE_CI_PATH}" -c just web-stack-apply

      - name: In-cluster health gate (rollout + /health readiness)
        uses: ./GloriousFlywheel/.github/actions/nix-job
        with:
          push-cache: "false"
          command: |
            set -euo pipefail
            cd overlay
            export GF_CORE_PATH=../GloriousFlywheel
            export GF_CORE_CI_PATH="github:tinyland-inc/GloriousFlywheel/${GF_CORE_REF}#ci"
            nix develop "${GF_CORE_CI_PATH}" -c just web-stack-health | tee "${RUNNER_TEMP}/web-health.txt"
            {
              echo "## GFTB web stack apply"
              echo ""
              echo "On-cluster health gate (readiness == GET /health :3000 per replica):"
              echo ""
              echo '```'
              cat "${RUNNER_TEMP}/web-health.txt"
              echo '```'
              echo ""
              echo "Public cutover is NOT done: the cloudflared route (P5), apex+www DNS flip (P6), and CF Pages decommission (P7) remain separate operator steps."
            } >> "$GITHUB_STEP_SUMMARY"
