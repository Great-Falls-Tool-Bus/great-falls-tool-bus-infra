name: Mail CRs

# TIN-2379: tenant-owned MailDomain/MailAccount CRs for latoolb.us. PR/push
# runs are offline validation only. Live server dry-run/apply is manual and
# protected by the `mail` environment kubeconfig.

on:
  pull_request:
    paths:
      - ".github/workflows/mail-crs.yml"
      - "Justfile"
      - "k8s/mail/**"
      - "scripts/validate-mail-crs.sh"
      - "docs/mail-cr-apply-runbook.md"
      - "docs/ci-credentials.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/mail-crs.yml"
      - "Justfile"
      - "k8s/mail/**"
      - "scripts/validate-mail-crs.sh"
      - "docs/mail-cr-apply-runbook.md"
      - "docs/ci-credentials.md"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "server-dry-run"
        type: choice
        options:
          - server-dry-run
          - apply

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GF_CORE_REF: 2281b576bce0e8dd776a047b84e7464f5b508a62
  HAS_GF_CORE_DEPLOY_KEY: ${{ secrets.GF_CORE_DEPLOY_KEY != '' }}
  HAS_GF_CORE_READ_TOKEN: ${{ secrets.GF_CORE_READ_TOKEN != '' }}

jobs:
  validate:
    name: Validate mail CRs
    runs-on: tinyland-nix
    steps:
      - name: Require GloriousFlywheel core read credential
        run: |
          if [[ "${HAS_GF_CORE_DEPLOY_KEY}" != "true" && "${HAS_GF_CORE_READ_TOKEN}" != "true" ]]; then
            echo "::error::GF_CORE_DEPLOY_KEY or GF_CORE_READ_TOKEN is required."
            exit 1
          fi
      - name: Checkout overlay
        uses: actions/checkout@v6
        with:
          path: overlay
      - name: Checkout GloriousFlywheel core with deploy key
        if: env.HAS_GF_CORE_DEPLOY_KEY == 'true'
        uses: actions/checkout@v6
        with:
          repository: tinyland-inc/GloriousFlywheel
          ref: ${{ env.GF_CORE_REF }}
          path: GloriousFlywheel
          ssh-key: ${{ secrets.GF_CORE_DEPLOY_KEY }}
      - name: Checkout GloriousFlywheel core with read token
        if: env.HAS_GF_CORE_DEPLOY_KEY != 'true' && env.HAS_GF_CORE_READ_TOKEN == 'true'
        uses: actions/checkout@v6
        with:
          repository: tinyland-inc/GloriousFlywheel
          ref: ${{ env.GF_CORE_REF }}
          path: GloriousFlywheel
          token: ${{ secrets.GF_CORE_READ_TOKEN }}
      - name: Validate manifests
        uses: ./GloriousFlywheel/.github/actions/nix-job
        with:
          push-cache: "false"
          command: |
            set -euo pipefail
            cd overlay
            export GF_CORE_PATH=../GloriousFlywheel
            export GF_CORE_CI_PATH=../GloriousFlywheel#ci
            nix develop ../GloriousFlywheel#ci -c just mail-cr-validate

  server:
    name: Server dry-run or apply
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: tinyland-nix
    environment: mail
    steps:
      - name: Require GloriousFlywheel core read credential
        run: |
          if [[ "${HAS_GF_CORE_DEPLOY_KEY}" != "true" && "${HAS_GF_CORE_READ_TOKEN}" != "true" ]]; then
            echo "::error::GF_CORE_DEPLOY_KEY or GF_CORE_READ_TOKEN is required."
            exit 1
          fi
      - name: Validate mail kubeconfig secret
        env:
          MAIL_APPLY_KUBECONFIG_B64: ${{ secrets.MAIL_APPLY_KUBECONFIG_B64 }}
          GFTB_MAIL_KUBECONFIG_B64: ${{ secrets.GFTB_MAIL_KUBECONFIG_B64 }}
        run: |
          if [[ -z "${MAIL_APPLY_KUBECONFIG_B64:-}" && -z "${GFTB_MAIL_KUBECONFIG_B64:-}" ]]; then
            echo "::error::MAIL_APPLY_KUBECONFIG_B64 is required in the protected mail environment; GFTB_MAIL_KUBECONFIG_B64 is also accepted as a compatibility alias."
            exit 1
          fi
      - name: Checkout overlay
        uses: actions/checkout@v6
        with:
          path: overlay
      - name: Checkout GloriousFlywheel core with deploy key
        if: env.HAS_GF_CORE_DEPLOY_KEY == 'true'
        uses: actions/checkout@v6
        with:
          repository: tinyland-inc/GloriousFlywheel
          ref: ${{ env.GF_CORE_REF }}
          path: GloriousFlywheel
          ssh-key: ${{ secrets.GF_CORE_DEPLOY_KEY }}
      - name: Checkout GloriousFlywheel core with read token
        if: env.HAS_GF_CORE_DEPLOY_KEY != 'true' && env.HAS_GF_CORE_READ_TOKEN == 'true'
        uses: actions/checkout@v6
        with:
          repository: tinyland-inc/GloriousFlywheel
          ref: ${{ env.GF_CORE_REF }}
          path: GloriousFlywheel
          token: ${{ secrets.GF_CORE_READ_TOKEN }}
      - name: Materialize namespace kubeconfig
        env:
          MAIL_APPLY_KUBECONFIG_B64: ${{ secrets.MAIL_APPLY_KUBECONFIG_B64 }}
          GFTB_MAIL_KUBECONFIG_B64: ${{ secrets.GFTB_MAIL_KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          kubeconfig="${RUNNER_TEMP}/gftb-mail.kubeconfig"
          if [[ -n "${MAIL_APPLY_KUBECONFIG_B64:-}" ]]; then
            kubeconfig_b64="${MAIL_APPLY_KUBECONFIG_B64}"
          else
            kubeconfig_b64="${GFTB_MAIL_KUBECONFIG_B64}"
          fi
          printf '%s' "${kubeconfig_b64}" | base64 -d > "${kubeconfig}"
          chmod 600 "${kubeconfig}"
          echo "GFTB_MAIL_KUBECONFIG=${kubeconfig}" >> "$GITHUB_ENV"
      - name: Server dry-run
        uses: ./GloriousFlywheel/.github/actions/nix-job
        with:
          push-cache: "false"
          command: |
            set -euo pipefail
            cd overlay
            export GF_CORE_PATH=../GloriousFlywheel
            export GF_CORE_CI_PATH=../GloriousFlywheel#ci
            if [ -n "${KUBERNETES_SERVICE_HOST:-}" ]; then
              cluster_name="$(nix develop ../GloriousFlywheel#ci -c kubectl --kubeconfig "${GFTB_MAIL_KUBECONFIG}" config view --minify -o jsonpath='{.contexts[0].context.cluster}')"
              nix develop ../GloriousFlywheel#ci -c kubectl --kubeconfig "${GFTB_MAIL_KUBECONFIG}" config set-cluster "${cluster_name}" --server=https://kubernetes.default.svc >/dev/null
            fi
            nix develop ../GloriousFlywheel#ci -c just mail-cr-server-dry-run
      - name: Apply
        if: github.event.inputs.action == 'apply'
        uses: ./GloriousFlywheel/.github/actions/nix-job
        with:
          push-cache: "false"
          command: |
            set -euo pipefail
            cd overlay
            export GF_CORE_PATH=../GloriousFlywheel
            export GF_CORE_CI_PATH=../GloriousFlywheel#ci
            nix develop ../GloriousFlywheel#ci -c just mail-cr-apply
