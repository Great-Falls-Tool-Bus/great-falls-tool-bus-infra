name: Form Stack

# TIN-2420 Path B: GFTB Anubis-gated contact intake (Anubis PoW gate ->
# stdlib form-handler -> LMTP inject to keyholders@latoolb.us). PR/push runs are
# offline validation only. Live server dry-run/apply is manual and protected by
# the `mail` environment kubeconfig.
#
# RBAC NOTE (see docs/runbooks/form-intake.md): workflow_dispatch apply must
# run with the protected namespace-scoped workload kubeconfig. PR/push remains
# offline validation only.

on:
  pull_request:
    paths:
      - ".github/workflows/form-crs.yml"
      - "Justfile"
      - "k8s/form/**"
      - "scripts/validate-form-stack.sh"
      - "scripts/test-form-altcha.py"
      - "docs/runbooks/form-intake.md"
      - "docs/ci-credentials.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/form-crs.yml"
      - "Justfile"
      - "k8s/form/**"
      - "scripts/validate-form-stack.sh"
      - "scripts/test-form-altcha.py"
      - "docs/runbooks/form-intake.md"
      - "docs/ci-credentials.md"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "server-dry-run"
        type: choice
        options:
          - server-dry-run
          - apply

permissions:
  contents: read

env:
  GF_CORE_REF: 2281b576bce0e8dd776a047b84e7464f5b508a62

jobs:
  validate:
    name: Validate form stack
    runs-on: tinyland-nix
    steps:
      - name: Checkout overlay
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: overlay
          persist-credentials: false
      - name: Checkout public GloriousFlywheel core
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: tinyland-inc/GloriousFlywheel
          ref: ${{ env.GF_CORE_REF }}
          path: GloriousFlywheel
          persist-credentials: false
      - name: Verify GloriousFlywheel core checkout
        run: |
          set -euo pipefail
          actual="$(git -C GloriousFlywheel rev-parse --verify HEAD)"
          if [ "${actual}" != "${GF_CORE_REF}" ]; then
            echo "::error::GloriousFlywheel checkout mismatch: expected ${GF_CORE_REF}, got ${actual}"
            exit 1
          fi
      - name: Validate manifests
        uses: ./GloriousFlywheel/.github/actions/nix-job
        with:
          push-cache: "false"
          command: |
            set -euo pipefail
            cd overlay
            export GF_CORE_PATH=../GloriousFlywheel
            export GF_CORE_CI_PATH="github:tinyland-inc/GloriousFlywheel/${GF_CORE_REF}#ci"
            nix develop "${GF_CORE_CI_PATH}" -c just form-stack-validate

  server:
    name: Server dry-run or apply
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: tinyland-nix
    environment: mail
    steps:
      - name: Validate mail kubeconfig secret
        env:
          MAIL_APPLY_KUBECONFIG_B64: ${{ secrets.MAIL_APPLY_KUBECONFIG_B64 }}
          GFTB_MAIL_KUBECONFIG_B64: ${{ secrets.GFTB_MAIL_KUBECONFIG_B64 }}
        run: |
          if [[ -z "${MAIL_APPLY_KUBECONFIG_B64:-}" && -z "${GFTB_MAIL_KUBECONFIG_B64:-}" ]]; then
            echo "::error::MAIL_APPLY_KUBECONFIG_B64 is required in the protected mail environment; GFTB_MAIL_KUBECONFIG_B64 is also accepted as a compatibility alias."
            exit 1
          fi
      - name: Checkout overlay
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: overlay
          persist-credentials: false
      - name: Checkout public GloriousFlywheel core
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: tinyland-inc/GloriousFlywheel
          ref: ${{ env.GF_CORE_REF }}
          path: GloriousFlywheel
          persist-credentials: false
      - name: Verify GloriousFlywheel core checkout
        run: |
          set -euo pipefail
          actual="$(git -C GloriousFlywheel rev-parse --verify HEAD)"
          if [ "${actual}" != "${GF_CORE_REF}" ]; then
            echo "::error::GloriousFlywheel checkout mismatch: expected ${GF_CORE_REF}, got ${actual}"
            exit 1
          fi
      - name: Materialize namespace kubeconfig
        env:
          MAIL_APPLY_KUBECONFIG_B64: ${{ secrets.MAIL_APPLY_KUBECONFIG_B64 }}
          GFTB_MAIL_KUBECONFIG_B64: ${{ secrets.GFTB_MAIL_KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          kubeconfig="${RUNNER_TEMP}/gftb-mail.kubeconfig"
          if [[ -n "${MAIL_APPLY_KUBECONFIG_B64:-}" ]]; then
            kubeconfig_b64="${MAIL_APPLY_KUBECONFIG_B64}"
          else
            kubeconfig_b64="${GFTB_MAIL_KUBECONFIG_B64}"
          fi
          printf '%s' "${kubeconfig_b64}" | base64 -d > "${kubeconfig}"
          chmod 600 "${kubeconfig}"
          echo "GFTB_MAIL_KUBECONFIG=${kubeconfig}" >> "$GITHUB_ENV"
      - name: Server dry-run
        uses: ./GloriousFlywheel/.github/actions/nix-job
        with:
          push-cache: "false"
          command: |
            set -euo pipefail
            cd overlay
            export GF_CORE_PATH=../GloriousFlywheel
            export GF_CORE_CI_PATH="github:tinyland-inc/GloriousFlywheel/${GF_CORE_REF}#ci"
            if [ -n "${KUBERNETES_SERVICE_HOST:-}" ]; then
              cluster_name="$(nix develop "${GF_CORE_CI_PATH}" -c kubectl --kubeconfig "${GFTB_MAIL_KUBECONFIG}" config view --minify -o jsonpath='{.contexts[0].context.cluster}')"
              nix develop "${GF_CORE_CI_PATH}" -c kubectl --kubeconfig "${GFTB_MAIL_KUBECONFIG}" config set-cluster "${cluster_name}" --server=https://kubernetes.default.svc >/dev/null
            fi
            nix develop "${GF_CORE_CI_PATH}" -c just form-stack-server-dry-run
      - name: Apply
        if: github.event.inputs.action == 'apply'
        uses: ./GloriousFlywheel/.github/actions/nix-job
        with:
          push-cache: "false"
          command: |
            set -euo pipefail
            cd overlay
            export GF_CORE_PATH=../GloriousFlywheel
            export GF_CORE_CI_PATH="github:tinyland-inc/GloriousFlywheel/${GF_CORE_REF}#ci"
            nix develop "${GF_CORE_CI_PATH}" -c just form-stack-apply
